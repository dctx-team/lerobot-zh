name: Deploy Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          pip install -e .
          pip install -r docs-requirements.txt

      - name: Build English documentation
        run: |
          doc-builder build lerobot docs/source/en --build_dir docs/_build/en --repo_name lerobot

      - name: Build Chinese documentation
        run: |
          doc-builder build lerobot docs/source/zh --build_dir docs/_build/zh --repo_name lerobot

      - name: Create index redirect
        run: |
          mkdir -p docs/_build
          # Root redirect: auto-detect language
          cat > docs/_build/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>LeRobot Documentation</title>
            <script>
              const userLang = navigator.language || navigator.userLanguage;
              const isZh = userLang.toLowerCase().startsWith('zh');
              window.location.href = isZh ? './zh/lerobot/v0.5.2/en/' : './en/lerobot/v0.5.2/en/';
            </script>
          </head>
          <body>
            <p>Redirecting...</p>
            <p><a href="./en/lerobot/v0.5.2/en/">English</a> | <a href="./zh/lerobot/v0.5.2/en/">中文</a></p>
          </body>
          </html>
          EOF
          # /en/ and /zh/ compat redirects
          cat > docs/_build/en/index.html << 'EOF2'
          <!DOCTYPE html><html><head><meta charset="utf-8"><script>window.location.href='./lerobot/v0.5.2/en/';</script></head><body><a href="./lerobot/v0.5.2/en/">English docs</a></body></html>
          EOF2
          cat > docs/_build/zh/index.html << 'EOF3'
          <!DOCTYPE html><html><head><meta charset="utf-8"><script>window.location.href='./lerobot/v0.5.2/en/';</script></head><body><a href="./lerobot/v0.5.2/en/">中文文档</a></body></html>
          EOF3

      - name: Debug build output
        run: find docs/_build -maxdepth 5 | head -50

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/_build'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
